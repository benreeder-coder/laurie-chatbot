<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Conference Assistant</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --page-bg: #faf0e6;
    --user-bubble: #0d9488;
    --bot-bubble: #f3e8db;
    --accent: #0d9488;
    --panel-bg: #1e3a7b;
    --body-text: #3d2c1e;
    --muted-text: #8a7968;
    --chip-border: #d4a574;
    --chip-text: #6b4226;
    --chip-bg: #fdf6ef;
    --input-border: #ddd0c2;
    --shadow: 0 8px 32px rgba(15, 23, 42, 0.12), 0 2px 8px rgba(15, 23, 42, 0.06);
    --font-heading: 'Outfit', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: #f5ebe0;
    font-family: var(--font-body);
    color: var(--body-text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(180, 130, 70, 0.04), transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(120, 80, 40, 0.03), transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #root {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 880px;
  }

  /* Message entry animation */
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-animate {
    animation: msgIn 0.2s ease-out both;
  }

  /* Typing dots */
  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }
  .typing-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted-text);
    display: inline-block;
    margin: 0 2px;
  }
  .typing-dot:nth-child(1) { animation: dotPulse 1.2s infinite 0s; }
  .typing-dot:nth-child(2) { animation: dotPulse 1.2s infinite 0.2s; }
  .typing-dot:nth-child(3) { animation: dotPulse 1.2s infinite 0.4s; }

  /* Scrollbar */
  .messages-scroll::-webkit-scrollbar { width: 5px; }
  .messages-scroll::-webkit-scrollbar-track { background: transparent; }
  .messages-scroll::-webkit-scrollbar-thumb { background: #c9b99a; border-radius: 3px; }

  /* Chip hover */
  .chip {
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    cursor: pointer;
    user-select: none;
  }
  .chip:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(180, 130, 70, 0.2);
    background: #f0e0d0;
  }
  .chip:active {
    transform: translateY(0);
  }

  /* Send button */
  .send-btn {
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  .send-btn:hover:not(:disabled) {
    filter: brightness(1.12);
  }
  .send-btn:active:not(:disabled) {
    transform: scale(0.94);
  }
  .send-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  /* Links in bot messages */
  .bot-msg a {
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .bot-msg a:hover {
    color: #0d7377;
  }

  /* Responsive: hide person panel on mobile */
  @media (max-width: 768px) {
    #root {
      max-width: 440px;
    }
    .person-panel {
      display: none !important;
    }
    .chat-column {
      border-radius: 0 0 0 16px !important;
    }
    .input-area {
      border-radius: 0 0 16px 16px !important;
    }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ──────────────────────────────────────────────
// CONFIG - Edit these values for your deployment
// ──────────────────────────────────────────────
const CONFIG = {
  webhookUrl: 'https://n8n.btb-ai.cloud/webhook/laurie-chatbot',
  botName: 'Elena',
  subtitle: 'Conference Assistant',
  greeting: "Hi! I'm Elena, your conference assistant. What can I help you with?",
  bannerImage: 'laurie.jpg',
  // To use a real photo for Elena, set this to the image path (e.g. 'elena-avatar.png')
  // and the SVG placeholder will be replaced automatically.
  elenaAvatar: null,
};

const QUICK_REPLIES = [
  { label: 'Conference Dates',    query: 'What are the conference dates?' },
  { label: 'Conference Location',  query: 'Where is the conference?' },
  { label: 'Register Attendees',   query: 'How do I register attendees?' },
  { label: 'Cancel / Substitute',  query: 'How do I cancel or substitute an attendee?' },
  { label: 'Hotel Booking',        query: 'How do I book a hotel room?' },
  { label: 'Ad Specs',             query: 'What are the program book ad specs?' },
  { label: 'Conference Swag',      query: 'How do I send conference swag for tote bags?' },
  { label: 'Attire',               query: 'What is the dress code?' },
];

// ──────────────────────────────────────────────

const { useState, useRef, useEffect, useCallback } = React;

function generateSessionId() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

const SESSION_ID = generateSessionId();

// -- Markdown-lite: convert **bold**, [text](url), and newlines --
function renderMessageText(text) {
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  const safeHref = (url) => url.replace(/"/g, '%22').replace(/'/g, '%27');

  const html = escaped
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_, text, url) =>
      `<a href="${safeHref(url)}" target="_blank" rel="noopener noreferrer">${text}</a>`)
    .replace(/(https?:\/\/[^\s<"]+)/g, (match, url, offset, str) => {
      // Skip URLs already inside an anchor tag (href or anchor text)
      const preceding = str.lastIndexOf('href="', offset);
      if (preceding !== -1 && str.indexOf('"', preceding + 6) > offset) return match;
      const lastClose = str.lastIndexOf('>', offset);
      const lastOpen = str.lastIndexOf('<', offset);
      if (lastClose > lastOpen) return match;
      return `<a href="${safeHref(url)}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    })
    .replace(/\n/g, '<br/>');

  return html;
}

// ── Avatar Components ────────────────────────

// Elena avatar: uses real image if CONFIG.elenaAvatar is set, otherwise SVG placeholder
function ElenaAvatar({ size }) {
  if (CONFIG.elenaAvatar) {
    return (
      <img
        src={CONFIG.elenaAvatar}
        alt="Elena"
        style={{
          width: size,
          height: size,
          borderRadius: '50%',
          objectFit: 'cover',
          objectPosition: 'top',
          flexShrink: 0,
        }}
      />
    );
  }
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ flexShrink: 0 }}>
      <circle cx="20" cy="20" r="20" fill="#0d9488" />
      <circle cx="20" cy="15" r="7" fill="white" />
      <ellipse cx="20" cy="33" rx="12" ry="10" fill="white" />
    </svg>
  );
}

// Generic user silhouette avatar
function UserAvatar({ size }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" style={{ flexShrink: 0 }}>
      <circle cx="20" cy="20" r="20" fill="#94a3b8" />
      <circle cx="20" cy="15" r="7" fill="white" />
      <ellipse cx="20" cy="33" rx="12" ry="10" fill="white" />
    </svg>
  );
}

// ── Components ───────────────────────────────

function BannerHeader() {
  return (
    <img
      src={CONFIG.bannerImage}
      alt="CCWC Conference Banner"
      style={{
        width: '100%',
        objectFit: 'cover',
        borderRadius: '16px 16px 0 0',
        display: 'block',
      }}
    />
  );
}

function PersonPanel() {
  return (
    <div
      className="person-panel"
      style={{
        width: '42%',
        background: 'var(--panel-bg)',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        borderRadius: '0 0 16px 0',
        position: 'relative',
        overflow: 'hidden',
        flexShrink: 0,
      }}
    >
      {/* Name and title area */}
      <div style={{
        paddingTop: 32,
        paddingBottom: 24,
        textAlign: 'center',
        zIndex: 1,
      }}>
        <div style={{
          fontFamily: 'var(--font-heading)',
          fontWeight: 600,
          fontSize: '20px',
          color: '#fff',
          lineHeight: 1.3,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          gap: '8px',
        }}>
          {CONFIG.botName}
          <span style={{
            fontSize: '11px',
            fontWeight: 600,
            background: 'rgba(20, 184, 166, 0.35)',
            color: '#5eead4',
            padding: '2px 8px',
            borderRadius: '4px',
            letterSpacing: '0.5px',
          }}>AI</span>
        </div>
        <div style={{
          fontSize: '14px',
          color: 'rgba(255, 255, 255, 0.7)',
          fontWeight: 400,
          lineHeight: 1.3,
          marginTop: '4px',
        }}>
          {CONFIG.subtitle}
        </div>
      </div>

      {/* Elena character image area */}
      <div style={{
        flex: 1,
        width: '100%',
        display: 'flex',
        alignItems: 'flex-end',
        justifyContent: 'center',
        position: 'relative',
      }}>
        {/* Gradient fade at top */}
        <div style={{
          position: 'absolute',
          top: 0,
          left: 0,
          right: 0,
          height: 40,
          background: 'linear-gradient(to bottom, var(--panel-bg), transparent)',
          zIndex: 1,
        }} />
        {CONFIG.elenaAvatar ? (
          <img
            src={CONFIG.elenaAvatar}
            alt="Elena - Conference Assistant"
            style={{
              width: '100%',
              height: '100%',
              objectFit: 'cover',
              objectPosition: 'top',
            }}
          />
        ) : (
          // SVG placeholder for the panel -- professional silhouette
          <svg viewBox="0 0 200 300" style={{ width: '70%', maxHeight: '100%', marginBottom: 0 }}>
            {/* Head */}
            <circle cx="100" cy="80" r="40" fill="rgba(255,255,255,0.15)" />
            {/* Body */}
            <path d="M 40 300 L 40 180 Q 40 140 70 130 L 100 120 L 130 130 Q 160 140 160 180 L 160 300 Z" fill="rgba(255,255,255,0.1)" />
            {/* Blazer lapels */}
            <path d="M 70 130 L 100 170 L 90 300 L 40 300 L 40 180 Q 40 140 70 130 Z" fill="rgba(255,255,255,0.08)" />
            <path d="M 130 130 L 100 170 L 110 300 L 160 300 L 160 180 Q 160 140 130 130 Z" fill="rgba(255,255,255,0.08)" />
            {/* Collar */}
            <path d="M 85 125 L 100 155 L 115 125" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="2" />
          </svg>
        )}
      </div>
    </div>
  );
}

function BotMessage({ text }) {
  return (
    <div className="msg-animate" style={{
      display: 'flex',
      alignItems: 'flex-start',
      padding: '0 16px',
      marginBottom: '12px',
      gap: '8px',
    }}>
      <ElenaAvatar size={28} />
      <div className="bot-msg" style={{
        background: 'var(--bot-bubble)',
        borderRadius: '4px 12px 12px 12px',
        padding: '12px 16px',
        maxWidth: 'calc(100% - 36px)',
        fontSize: '14px',
        lineHeight: 1.6,
        color: 'var(--body-text)',
      }} dangerouslySetInnerHTML={{ __html: renderMessageText(text) }} />
    </div>
  );
}

function UserMessage({ text }) {
  return (
    <div className="msg-animate" style={{
      display: 'flex',
      alignItems: 'flex-start',
      justifyContent: 'flex-end',
      padding: '0 16px',
      marginBottom: '12px',
      gap: '8px',
    }}>
      <div style={{
        background: 'var(--user-bubble)',
        borderRadius: '12px 4px 12px 12px',
        padding: '12px 16px',
        maxWidth: 'calc(100% - 36px)',
        fontSize: '14px',
        lineHeight: 1.6,
        color: '#fff',
      }}>
        {text}
      </div>
      <UserAvatar size={28} />
    </div>
  );
}

function TypingIndicator() {
  return (
    <div className="msg-animate" style={{
      display: 'flex',
      alignItems: 'flex-start',
      padding: '0 16px',
      marginBottom: '12px',
      gap: '8px',
    }}>
      <ElenaAvatar size={28} />
      <div style={{
        background: 'var(--bot-bubble)',
        borderRadius: '4px 12px 12px 12px',
        padding: '14px 20px',
        display: 'flex',
        alignItems: 'center',
        gap: '2px',
      }}>
        <span className="typing-dot" />
        <span className="typing-dot" />
        <span className="typing-dot" />
      </div>
    </div>
  );
}

function QuickReplies({ onSelect }) {
  return (
    <div className="msg-animate" style={{
      padding: '4px 16px 8px 52px',
      display: 'flex',
      flexWrap: 'wrap',
      gap: '8px',
    }}>
      {QUICK_REPLIES.map(item => (
        <button
          key={item.label}
          className="chip"
          onClick={() => onSelect(item.query)}
          style={{
            background: 'var(--chip-bg)',
            border: '1px solid var(--chip-border)',
            borderRadius: '999px',
            padding: '7px 14px',
            fontSize: '13px',
            fontFamily: 'var(--font-body)',
            fontWeight: 500,
            color: 'var(--chip-text)',
            lineHeight: 1.3,
          }}
        >
          {item.label}
        </button>
      ))}
    </div>
  );
}

function InputArea({ onSend, disabled }) {
  const [value, setValue] = useState('');
  const inputRef = useRef(null);

  const handleSend = useCallback(() => {
    const trimmed = value.trim();
    if (!trimmed || disabled) return;
    onSend(trimmed);
    setValue('');
  }, [value, disabled, onSend]);

  const handleKeyDown = useCallback((e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSend();
    }
  }, [handleSend]);

  useEffect(() => {
    if (!disabled && inputRef.current) inputRef.current.focus();
  }, [disabled]);

  return (
    <div className="input-area" style={{
      padding: '16px 20px',
      borderTop: '1px solid var(--input-border)',
      display: 'flex',
      alignItems: 'center',
      gap: '10px',
      background: '#fdf8f3',
      borderRadius: '0 0 0 16px',
    }}>
      <input
        ref={inputRef}
        type="text"
        placeholder="Type your question..."
        value={value}
        onChange={e => setValue(e.target.value)}
        onKeyDown={handleKeyDown}
        disabled={disabled}
        style={{
          flex: 1,
          border: '1px solid var(--input-border)',
          borderRadius: '999px',
          padding: '10px 16px',
          fontSize: '14px',
          fontFamily: 'var(--font-body)',
          color: 'var(--body-text)',
          outline: 'none',
          background: 'var(--page-bg)',
          transition: 'border-color 0.15s ease',
        }}
        onFocus={e => e.target.style.borderColor = 'var(--accent)'}
        onBlur={e => e.target.style.borderColor = 'var(--input-border)'}
      />
      <button
        className="send-btn"
        onClick={handleSend}
        disabled={disabled || !value.trim()}
        style={{
          width: 40,
          height: 40,
          borderRadius: '50%',
          background: 'var(--accent)',
          border: 'none',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          cursor: 'pointer',
          flexShrink: 0,
        }}
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  );
}

// ── Main Widget ──────────────────────────────

function ChatWidget() {
  const [messages, setMessages] = useState([
    { role: 'bot', text: CONFIG.greeting },
  ]);
  const [loading, setLoading] = useState(false);
  const messagesEndRef = useRef(null);

  const scrollToBottom = useCallback(() => {
    if (messagesEndRef.current) {
      messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
    }
  }, []);

  useEffect(() => {
    scrollToBottom();
  }, [messages, loading, scrollToBottom]);

  const sendMessage = useCallback(async (text) => {
    setMessages(prev => [...prev, { role: 'user', text }]);
    setLoading(true);

    try {
      const res = await fetch(CONFIG.webhookUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chatInput: text,
          sessionId: SESSION_ID,
        }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      const reply = data.output || data.text || data.response || data.message ||
        (typeof data === 'string' ? data : 'No response received.');

      setMessages(prev => [...prev, { role: 'bot', text: reply }]);
    } catch (err) {
      console.error('Chat error:', err);
      setMessages(prev => [...prev, {
        role: 'bot',
        text: 'Something went wrong. Please try again.',
      }]);
    } finally {
      setLoading(false);
    }
  }, []);

  return (
    <div style={{
      borderRadius: '16px',
      boxShadow: 'var(--shadow)',
      overflow: 'hidden',
      display: 'flex',
      flexDirection: 'column',
      height: 'min(700px, calc(100dvh - 32px))',
      background: 'var(--page-bg)',
      border: '3px solid #c97b3a',
    }}>
      {/* Banner header - full width */}
      <BannerHeader />

      {/* Two-column body */}
      <div style={{
        flex: 1,
        display: 'flex',
        flexDirection: 'row',
        overflow: 'hidden',
      }}>
        {/* Left column: chat + input */}
        <div className="chat-column" style={{
          flex: 1,
          display: 'flex',
          flexDirection: 'column',
          minWidth: 0,
          borderRadius: '0 0 0 16px',
        }}>
          <div className="messages-scroll" style={{
            flex: 1,
            overflowY: 'auto',
            paddingTop: '20px',
            paddingBottom: '8px',
          }}>
            {messages.map((msg, i) =>
              msg.role === 'bot'
                ? <BotMessage key={i} text={msg.text} />
                : <UserMessage key={i} text={msg.text} />
            )}

            {messages.length === 1 && !loading && (
              <QuickReplies onSelect={sendMessage} />
            )}

            {loading && <TypingIndicator />}

            <div ref={messagesEndRef} />
          </div>

          <InputArea onSend={sendMessage} disabled={loading} />
        </div>

        {/* Right column: person panel */}
        <PersonPanel />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ChatWidget />);
</script>
</body>
</html>
